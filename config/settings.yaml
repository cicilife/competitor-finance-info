system:
  name: 迪卡侬竞品资讯收集系统
  version: 1.0.0
  timezone: Asia/Shanghai

directories:
  config: config/
  data_raw: data/raw/
  data_processed: data/processed/
  output: output/
  logs: logs/
  pdf_storage: data/raw/pdf/
  news_storage: data/raw/news/

database:
  filename: reports.db
  path: data/processed/

crawler:
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/128.0.0.0 Safari/537.36"
  timeout: 30
  max_retries: 3
  delay: 2
  max_workers: 4

pdf:
  max_pages: 100
  min_text_length: 50

schedule:
  weekly_update_day: monday
  weekly_update_hour: 2
  retry_interval: 3600

notification:
  enabled: false
  type: email
  smtp_server: smtp.example.com
  smtp_port: 587
  from_email: competitor_report@example.com
  to_emails:
    - user@example.com

logging:
  level: INFO
  format: "%(asctime)s - %(levelname)s - %(message)s"
  max_bytes: 10485760
  backup_count: 5